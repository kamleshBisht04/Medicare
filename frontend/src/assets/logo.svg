  <!-- Outer soft hexagon ring -->
  <polygon points="100,48 148,22 196,48 196,100 148,126 100,100" fill="#ede9fe" stroke="#c7d2fe" stroke-width="1" style="fill:rgb(237, 233, 254);stroke:rgb(199, 210, 254);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Mid hexagon -->
